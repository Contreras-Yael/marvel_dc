<stats-co></stats-co>
@if (listhero.length > 0) {
<div class="mosaico">
@for (elemento of listhero; track elemento.id) {
  <card-hero
  [carta]="elemento"
  (favorito)="addfav($event )"
  (team)="addteam($event)"
  ></card-hero>
}
</div>
}@else {
  <h4>No hay ningun resultado asi</h4>
}

<teamhero [favlist]="favlist()" [teamlist]="teamlist()" ></teamhero>

<Search-bar [hero]="listhero" ></Search-bar>
