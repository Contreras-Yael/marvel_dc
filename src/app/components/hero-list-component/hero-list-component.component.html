<Search-bar (busqueda)="filtrado($event)"></Search-bar> 

@if (listhero) {
<div class="mosaico">
@for (elemento of listhero; track elemento.id) {
  <card-hero [carta]="elemento" (favorito)="addfav($event )"></card-hero>
}
</div>
}@else{
  <div>
    <p>No hay personaje asi.</p>
  </div>
}


<teamhero [favlist]="favoritos"></teamhero>
