 <Search-bar (busqueda)=aplicarFiltros($event)></Search-bar>
 <stats-co></stats-co>

@if (items().length > 0) {
<div class="mosaico">
@for (elemento of items(); track elemento.id) {

<card-hero
  [carta]="elemento"
  (favorito)="addfav($event )"
  (team)="addteam($event)"
  ></card-hero>
}
</div>
}@else {
  <h4>No hay ningun resultado asi</h4>
}

<teamhero [favlist]="favlist()" [teamlist]="teamlist()" ></teamhero>
