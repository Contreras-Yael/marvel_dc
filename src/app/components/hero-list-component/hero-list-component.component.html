
<stats-co></stats-co>

@if (historialbusc.items().length > 0) {
<div class="mosaico">
@for (elemento of historialbusc.items(); track elemento.id) {

<card-hero
  [carta]="elemento"
  (favorito)="historialbusc.addfav($event )"
  (team)="historialbusc.addteam($event)"
  ></card-hero>
}
</div>
}@else {
  <h4>No hay ningun resultado asi</h4>
}

<teamhero [favlist]="historialbusc.favlist()" [teamlist]="historialbusc.teamlist()" ></teamhero>
