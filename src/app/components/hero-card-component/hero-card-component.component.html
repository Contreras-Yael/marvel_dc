@if (carta) {
<div class="card" [class.borde-dc]="carta.tipo === 'DC'" [class.borde-marvel]="carta.tipo === 'Marvel'">
  <div class="container-card">
      @switch (carta.tipo) {
        @case ('DC') {
        <h4 class="DC"><b>{{carta?.nombre}} {{carta.tipo | emogi}}</b></h4>
        }
        @case ('Marvel') {
        <h4 class="Marvel"><b>{{carta?.nombre}} {{carta.tipo | emogi}}</b></h4>
        }
  }
    <h4>Descripcion</h4>
    <p>{{carta?.resume}}</p>

    <h4>Estadisiticas</h4>
    <p>Poder en escala 1 - 100: {{carta?.poder}}</p>
  </div>

<div class="botones_extra">
<button class="button-fav" (click)="seleccionfav()">
    @if (carta.favoritos) {
      quitar
    }@else{
      agregar a favoritos
    }
  </button>

  <button class="button-fav" (click)="selectteam()">
    Agregar equipo
  </button>

  </div>

</div>
}
